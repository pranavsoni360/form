services:
  postgres:
    image: postgres:16
    container_name: vaani-los-postgres
    restart: unless-stopped
    ports:
      - "${LOS_PG_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${LOS_PG_USER:-los_admin}
      POSTGRES_PASSWORD: ${LOS_PG_PASSWORD:?Set LOS_PG_PASSWORD}
      POSTGRES_DB: ${LOS_PG_DB:-los_form}
    volumes:
      - los-pgdata:/var/lib/postgresql/data

volumes:
  los-pgdata:
